version = 1
name = "tunnel-client"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

PROJECT_ROOT="$(pwd -P)"
if [[ ! -f "$PROJECT_ROOT/go.mod" || ! -f "$PROJECT_ROOT/adminui/pnpm-lock.yaml" ]]; then
  echo "Run this environment from the tunnel-client project root." >&2
  exit 1
fi
cd "$PROJECT_ROOT"

go mod download
pnpm --dir adminui install \
  --frozen-lockfile \
  --config.shared-workspace-lockfile=false \
  --config.confirmModulesPurge=false
'''

[[actions]]
name = "Test"
icon = "test"
command = "make test"

[[actions]]
name = "Build"
icon = "run"
command = "make tunnel-client"
